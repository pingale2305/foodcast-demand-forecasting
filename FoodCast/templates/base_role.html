<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodCast — {% block title %}Dashboard{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --orange: #FF6B2B;
            --dark: #0F0F0F; --dark2: #161616; --card: #1A1A1A;
            --border: rgba(255,255,255,0.08); --muted: rgba(255,255,255,0.45);
            --role-color: {% block role_color %}#FF6B2B{% endblock %};
        }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; }

        nav {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 50px;
            background: rgba(15,15,15,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo { display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;text-decoration:none;color:#fff; }
        .logo-dot { width:9px;height:9px;background:var(--orange);border-radius:50%; }

        .nav-right { display: flex; align-items: center; gap: 14px; }
        .role-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 18px; border-radius: 20px;
            font-size: 13px; font-weight: 600;
            background: rgba(255,107,43,0.12);
            border: 1px solid rgba(255,107,43,0.25);
            color: var(--orange);
        }
        .role-pill i { font-size: 12px; }

        .nav-link {
            color: var(--muted); font-size: 14px; text-decoration: none;
            padding: 8px 16px; border-radius: 10px;
            border: 1px solid var(--border); transition: all 0.3s;
        }
        .nav-link:hover { color:#fff; border-color:rgba(255,255,255,0.2); }

        /* MAIN LAYOUT */
        .page-wrap { max-width: 900px; margin: 0 auto; padding: 50px 40px; }

        .page-header { margin-bottom: 40px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        .page-label { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--orange);margin-bottom:8px; }
        .page-title { font-family:'Playfair Display',serif;font-size:36px;font-weight:700;margin-bottom:8px; }
        .page-sub { font-size:14px;color:var(--muted); }

        /* CARDS */
        .section-card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 24px; overflow: hidden;
            margin-bottom: 24px;
            animation: fadeIn 0.5s ease;
        }

        .card-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .card-header-icon {
            width: 38px; height: 38px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            background: rgba(255,107,43,0.12); color: var(--orange);
        }
        .card-header-title { font-size: 16px; font-weight: 700; }
        .card-header-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

        .card-body { padding: 28px; }

        /* MESSAGE FORM */
        .msg-textarea {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: #fff; font-size: 14px; font-family: 'Inter',sans-serif;
            resize: vertical; min-height: 100px; outline: none;
            transition: all 0.3s;
        }
        .msg-textarea::placeholder { color: rgba(255,255,255,0.25); }
        .msg-textarea:focus { border-color: var(--orange); background: rgba(255,107,43,0.04); box-shadow: 0 0 0 3px rgba(255,107,43,0.1); }

        .send-btn {
            margin-top: 12px;
            padding: 13px 28px;
            background: linear-gradient(135deg, var(--orange), #E8561A);
            border: none; border-radius: 12px;
            color: #fff; font-size: 14px; font-weight: 700;
            font-family: 'Inter',sans-serif; cursor: pointer;
            transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 6px 20px rgba(255,107,43,0.25);
        }
        .send-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,43,0.4); }

        /* MESSAGES LIST */
        .msgs-list { display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble {
            padding: 14px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8);
            animation: fadeIn 0.4s ease;
        }
        .msg-bubble.empty {
            text-align: center; color: var(--muted);
            padding: 24px; font-style: italic;
        }

        @media(max-width:700px) {
            nav { padding: 16px 20px; }
            .page-wrap { padding: 30px 20px; }
        }
    </style>
</head>
<body>
<nav>
    <a href="/" class="logo"><div class="logo-dot"></div> FoodCast</a>
    <div class="nav-right">
        <div class="role-pill"><i class="{% block role_icon %}fas fa-user{% endblock %}"></i> {% block role_name %}User{% endblock %}</div>
        <a href="/" class="nav-link"><i class="fas fa-arrow-right-from-bracket" style="margin-right:6px"></i>Logout</a>
    </div>
</nav>

<div class="page-wrap">
    {% block content %}{% endblock %}
</div>
</body>
</html>
